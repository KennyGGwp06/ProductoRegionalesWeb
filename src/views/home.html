<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dashboard - Productos Regionales Doña Solina" />
  <title>Home | Productos Regionales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --color-bg-dark: #1a1a3e;
      --color-bg-mid: #2d2b6b;
      --color-accent: #6c63ff;
      --color-accent-dark: #4f46e5;
      --font-main: 'Poppins', 'Segoe UI', sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-main);
      min-height: 100vh;
      background: linear-gradient(135deg, var(--color-bg-dark) 0%, var(--color-bg-mid) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      gap: 16px;
    }

    .home-icon {
      font-size: 4rem;
      color: var(--color-accent);
      margin-bottom: 8px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    p {
      color: rgba(255, 255, 255, 0.65);
      font-size: 0.95rem;
    }

    .btn-logout {
      margin-top: 24px;
      padding: 12px 32px;
      background: var(--color-accent-dark);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--font-main);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-logout:hover {
      background: var(--color-accent);
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <div class="home-icon"><i class="fa-solid fa-store"></i></div>
  <h1>¡Bienvenido!</h1>
  <p>Acceso correcto a Productos Regionales - Doña Solina</p>
  <a href="/api/auth/logout" class="btn-logout" id="btn-logout">
    <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
  </a>

  <script>
    document.getElementById('btn-logout').addEventListener('click', async (e) => {
      e.preventDefault();
      try {
        const res = await fetch('/api/auth/logout');
        if (res.ok) {
          window.location.href = '/'; // Regresa al login
        }
      } catch (error) {
        console.error('Error al salir:', error);
      }
    });
  </script>
</body>

</html>
